name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install rclone (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: curl https://rclone.org/install.sh | sudo bash
      
      - name: Install rclone (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install rclone
      
      - name: Install rclone (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install rclone -y
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=rclone_wrapper --cov-report=xml
      
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
  
  lint:
    name: Lint code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy pydantic
      
      - name: Run Black
        run: black --check rclone_wrapper/ cli.py
      
      - name: Run Flake8
        run: flake8 rclone_wrapper/ cli.py --max-line-length=100
      
      - name: Run mypy
        run: mypy rclone_wrapper/ cli.py
